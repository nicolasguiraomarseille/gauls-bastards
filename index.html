<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>GAULS BASTARDS - Ride Custom</title>

  <!-- FONT -->
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&display=swap" rel="stylesheet">

  <!-- STYLE -->
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0d0d0d;
      color: white;
    }

    nav {
      position: fixed;
      top: 0;
      width: 100%;
      background: black;
      display: flex;
      justify-content: center;
      padding: 15px;
      z-index: 1000;
    }

    nav a {
      color: white;
      margin: 0 15px;
      text-decoration: none;
      font-weight: bold;
    }

    header {
      height: 100vh;
      background: black;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding-top: 60px;
    }

    header h1 {
      font-family: 'Cinzel', serif;
      font-size: 80px;
      margin: 0;
    }

    header h2 {
      color: orange;
      margin: 10px 0;
    }

    header p {
      max-width: 600px;
    }

    section {
      padding: 80px 20px;
      text-align: center;
    }

    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 10px;
    }

    .gallery img {
      width: 100%;
      height: 250px;
      object-fit: cover;
    }

    iframe {
      width: 80%;
      height: 400px;
      border: none;
    }

    .socials a {
      margin: 10px;
      display: inline-block;
      padding: 10px 20px;
      border: 1px solid white;
      text-decoration: none;
      color: white;
    }
  </style>
</head>

<body>
