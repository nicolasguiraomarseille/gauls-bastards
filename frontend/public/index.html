<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>GAULS BASTARDS</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0a0a0a;
  color:white;
}

header {
  background:black;
  padding:20px;
  text-align:center;
  border-bottom:2px solid #f1c40f;
}

header h1 {
  color:#f1c40f;
  margin:0;
}

nav {
  margin-top:10px;
}

nav a {
  color:white;
  margin:10px;
  text-decoration:none;
  font-weight:bold;
}

.hero {
  padding:60px 20px;
  text-align:center;
  background:linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.9)), url('https://images.unsplash.com/photo-1518655048521-f130df041f66');
  background-size:cover;
}

.hero h2 {
  font-size:40px;
  color:#f1c40f;
}

.section {
  padding:40px 20px;
  text-align:center;
}

.youtube iframe {
  width:90%;
  max-width:800px;
  height:400px;
  border:none;
}

.gallery {
  display:grid;
  grid-template-columns:repeat(auto-fit, minmax(250px,1fr));
  gap:10px;
  padding:20px;
}

.gallery img {
  width:100%;
  height:200px;
  object-fit:cover;
}

footer {
  background:black;
  padding:20px;
  text-align:center;
  border-top:2px solid #f1c40f;
}

.social a {
  color:#f1c40f;
  margin:10px;
  font-size:20px;
}
</style>

</head>

<body>

<header>
  <h1>GAULS BASTARDS</h1>
  <nav>
    <a href="#">Accueil</a>
    <a href="#galerie">Galerie</a>
    <a href="#youtube">YouTube</a>
    <a href="#contact">Contact</a>
  </nav>
</header>

<section class="hero">
  <h2>Ride Custom</h2>
  <p>Une moto, une route, des amis</p>
</section>

<section class="section">
  <h2>Association de motards dans le 13</h2>
  <p>Communauté biker basée à Marseille, passion custom, liberté et fraternité.</p>
</section>

<section id="youtube" class="section youtube">
  <h2>Notre chaîne YouTube</h2>
  <iframe src="https://www.youtube.com/embed?listType=user_uploads&list=gaulsbastardscrew"></iframe>
</section>

<section id="galerie" class="gallery">
  <img src="https://images.unsplash.com/photo-1502877338535-766e1452684a">
  <img src="https://images.unsplash.com/photo-1518655048521-f130df041f66">
  <img src="https://images.unsplash.com/photo-1504215680853-026ed2a45def">
  <img src="https://images.unsplash.com/photo-1517841905240-472988babdf9">
</section>

<footer id="contact">
  <p>Suivez-nous :</p>
  <div class="social">
    <a href="https://www.facebook.com/">Facebook</a>
